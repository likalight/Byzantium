# =============================================================================
# Byzantium Gateway — Production nginx Configuration
# =============================================================================
# Assumes nginx 1.24+ (Debian bookworm / Ubuntu 22.04 packages).
# TLS certificates are expected at:
#   /etc/ssl/byzantium/cert.pem  (full-chain certificate)
#   /etc/ssl/byzantium/key.pem   (private key, mode 0600, owned by root)
# =============================================================================

user  nginx;
worker_processes  auto;          # one worker per CPU core
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;   # hide nginx version

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.api+json;

    # -------------------------------------------------------------------------
    # Rate Limiting (second layer — application-level limiting is also active)
    # Keyed on binary client IP; 10 MB shared zone holds ~160 000 entries.
    # -------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr  zone=byz_ratelimit:10m  rate=10r/s;
    limit_req_status 429;

    # -------------------------------------------------------------------------
    # Upstream — Byzantium gateway service
    # In Kubernetes, replace "gateway" with the k8s Service DNS name, e.g.:
    #   server  byzantium-gateway.default.svc.cluster.local:8080;
    # In docker-compose the service name "gateway" resolves automatically.
    # -------------------------------------------------------------------------
    upstream byzantium_gateway {
        server  gateway:8080;

        # Keep a pool of idle connections to the backend.
        keepalive         32;
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }

    # -------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen       80;
        listen  [::]:80;
        server_name  _;

        # ACME / Let's Encrypt challenge passthrough (if using certbot).
        location /.well-known/acme-challenge/ {
            root  /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server
    # -------------------------------------------------------------------------
    server {
        listen       443 ssl;
        listen  [::]:443 ssl;
        http2        on;
        server_name  _;

        # ------------------------------------------------------------------
        # TLS
        # Certificates managed by certbot (run nginx/certbot-setup.sh first).
        # Replace DOMAIN_PLACEHOLDER with your actual domain, e.g.:
        #   /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem
        # ------------------------------------------------------------------
        ssl_certificate      /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # Modern TLS only — drops IE 11 and older Android.
        ssl_protocols              TLSv1.2 TLSv1.3;
        ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers  off;

        ssl_stapling         on;
        ssl_stapling_verify  on;

        # ------------------------------------------------------------------
        # Security headers
        # ------------------------------------------------------------------
        # Force HTTPS for 1 year; include subdomains; enable preload list.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Prevent the response from being framed by other origins.
        add_header X-Frame-Options "DENY" always;

        # Stop browsers from MIME-sniffing.
        add_header X-Content-Type-Options "nosniff" always;

        # Referrer policy — send nothing cross-origin.
        add_header Referrer-Policy "no-referrer" always;

        # Permissions policy — deny all powerful features not needed by an API.
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Content Security Policy — restrictive baseline for an API service.
        # Adjust if the gateway ever serves browser-facing HTML/JS.
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

        # ------------------------------------------------------------------
        # Rate limiting (burst allows short spikes without immediate 429).
        # nodelay means requests over the burst are rejected immediately
        # rather than queued, keeping latency predictable.
        # ------------------------------------------------------------------
        limit_req  zone=byz_ratelimit  burst=20  nodelay;

        # ------------------------------------------------------------------
        # Proxy to Byzantium gateway
        # ------------------------------------------------------------------
        location / {
            proxy_pass         http://byzantium_gateway;
            proxy_http_version 1.1;

            # Required for keepalive to the upstream pool.
            proxy_set_header   Connection        "";

            # Standard forwarding headers.
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket upgrade headers (for future streaming / SSE endpoints).
            proxy_set_header   Upgrade           $http_upgrade;
            # Use "upgrade" only when client requests it, otherwise keep-alive.
            proxy_set_header   Connection        $connection_upgrade;

            # Timeouts — trust checks may involve ZK proof generation.
            proxy_connect_timeout  5s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;

            # Buffer settings — avoid buffering for streaming responses.
            proxy_buffering    off;
            proxy_request_buffering off;
        }

        # Expose the health endpoint without rate limiting so load balancers
        # and Kubernetes probes are never rejected.
        location /health {
            limit_req  off;
            proxy_pass http://byzantium_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;
        }
    }

    # -------------------------------------------------------------------------
    # WebSocket connection upgrade map
    # Needed by the Connection header override in the proxy block above.
    # -------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       keep-alive;
    }
}
