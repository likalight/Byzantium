name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'sdk-v*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: byzantium
          POSTGRES_PASSWORD: byzantium
          POSTGRES_DB: byzantium
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://byzantium:byzantium@localhost:5432/byzantium
      REDIS_URL: redis://localhost:6379
      BYZ_API_KEYS: ci-test-key-001

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        run: sqlx migrate run --database-url $DATABASE_URL

      - name: Generate sqlx query cache
        run: |
          cargo sqlx prepare --workspace
          echo "sqlx cache generated"

      - name: Upload sqlx cache
        uses: actions/upload-artifact@v4
        with:
          name: sqlx-cache
          path: .sqlx/
          retention-days: 1

      - name: cargo test
        run: cargo test --workspace --all-targets

  integration-db:
    name: Integration Tests (DB-backed)
    runs-on: ubuntu-latest
    needs: [check]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: byzantium
          POSTGRES_PASSWORD: byzantium
          POSTGRES_DB: byzantium
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://byzantium:byzantium@localhost:5432/byzantium
      REDIS_URL: redis://localhost:6379
      BYZ_API_KEYS: ci-test-key-001
      BYZ_RATE_LIMIT_PER_MIN: "1000"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres
      - name: Run migrations
        run: sqlx migrate run --database-url $DATABASE_URL
      - name: Run integration tests (DB-backed)
        run: cargo test -p byz-gateway --test integration --features integration-db -- --test-threads=1

  e2e:
    name: End-to-End Tests
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run E2E tests
        run: cargo test -p byz-gateway --test e2e -- --nocapture

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download sqlx cache
        uses: actions/download-artifact@v4
        with:
          name: sqlx-cache
          path: .sqlx/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: byzantium-gateway:${{ github.sha }}
          build-args: SQLX_OFFLINE=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-sdk:
    name: Publish SDK to npm
    needs: [test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
