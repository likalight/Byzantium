# Redis Sentinel configuration for Byzantium
# Deploy 3 sentinels for quorum

sentinel monitor byzantium-redis redis-master 6379 2
sentinel auth-pass byzantium-redis ${REDIS_PASSWORD}
sentinel down-after-milliseconds byzantium-redis 5000
sentinel failover-timeout byzantium-redis 10000
sentinel parallel-syncs byzantium-redis 1

# Notification script (optional)
# sentinel notification-script byzantium-redis /etc/redis/notify.sh
