apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: byzantium-gateway-tls
  namespace: default
spec:
  secretName: byzantium-gateway-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - ${BYZANTIUM_DOMAIN}
  duration: 2160h   # 90 days
  renewBefore: 360h # renew 15 days before expiry
