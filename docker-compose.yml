version: "3.9"

services:
  # Run sqlx migrations before the gateway starts
  migrate:
    image: ghcr.io/launchbadge/sqlx-cli:latest
    environment:
      DATABASE_URL: postgres://byzantium:byzantium@postgres:5432/byzantium
    volumes:
      - ./migrations:/migrations
    command: ["sqlx", "migrate", "run", "--source", "/migrations"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8080
      - DATABASE_URL=postgres://byzantium:byzantium@postgres:5432/byzantium
      - REDIS_URL=redis://redis:6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=byzantium
      - IMMUDB_HOST=immudb
      - IMMUDB_PORT=3322
      - IMMUDB_USERNAME=immudb
      - IMMUDB_PASSWORD=immudb
      - IMMUDB_DATABASE=defaultdb
      - RUST_LOG=byzantium=info,tower_http=debug
      # Optional: set OTEL_EXPORTER_OTLP_ENDPOINT to enable distributed tracing.
      # When the "observability" profile is active the jaeger service provides this endpoint.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      immudb:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - gateway
    restart: unless-stopped

  mandate-tee:
    build:
      context: .
      dockerfile: crates/byz-tee/Dockerfile.mandate
    ports:
      - "9001:9001"
    environment:
      - MANDATE_ENGINE_PORT=9001
    restart: unless-stopped
    profiles: ["tee"]   # only started when --profile tee is given

  reputation-tee:
    build:
      context: .
      dockerfile: crates/byz-tee/Dockerfile.reputation
    ports:
      - "9002:9002"
    environment:
      - REPUTATION_TEE_PORT=9002
    restart: unless-stopped
    profiles: ["tee"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: byzantium
      POSTGRES_PASSWORD: byzantium
      POSTGRES_DB: byzantium
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byzantium"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/byzantium
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      - "7474:7474"
      - "7687:7687"

  immudb:
    image: codenotary/immudb:latest
    environment:
      IMMUDB_ADDRESS: 0.0.0.0
      IMMUDB_PORT: 3322
    volumes:
      - immudb_data:/var/lib/immudb
    ports:
      - "3322:3322"
      - "8322:8080"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    profiles: ["observability"]

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: byzantium

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles: ["observability"]

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    profiles: ["observability"]

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    profiles: ["observability"]

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  immudb_data:
