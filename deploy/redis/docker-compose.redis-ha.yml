# Redis HA with Sentinel — use instead of the single redis node in docker-compose.yml
# docker compose -f docker-compose.yml -f deploy/redis/docker-compose.redis-ha.yml up -d

services:
  redis-master:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_master_data:/data
    ports:
      - "6379:6379"

  redis-replica:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --replicaof redis-master 6379
      --masterauth ${REDIS_PASSWORD}
    volumes:
      - redis_replica_data:/data
    depends_on:
      - redis-master

  sentinel-1:
    image: redis:7-alpine
    command: >
      sh -c "echo 'sentinel monitor byzantium-redis redis-master 6379 2
      sentinel auth-pass byzantium-redis ${REDIS_PASSWORD}
      sentinel down-after-milliseconds byzantium-redis 5000
      sentinel failover-timeout byzantium-redis 10000' > /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      - redis-master
      - redis-replica

  sentinel-2:
    image: redis:7-alpine
    command: >
      sh -c "echo 'sentinel monitor byzantium-redis redis-master 6379 2
      sentinel auth-pass byzantium-redis ${REDIS_PASSWORD}
      sentinel down-after-milliseconds byzantium-redis 5000
      sentinel failover-timeout byzantium-redis 10000' > /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      - redis-master
      - redis-replica

  sentinel-3:
    image: redis:7-alpine
    command: >
      sh -c "echo 'sentinel monitor byzantium-redis redis-master 6379 2
      sentinel auth-pass byzantium-redis ${REDIS_PASSWORD}
      sentinel down-after-milliseconds byzantium-redis 5000
      sentinel failover-timeout byzantium-redis 10000' > /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      - redis-master
      - redis-replica

volumes:
  redis_master_data:
  redis_replica_data:
